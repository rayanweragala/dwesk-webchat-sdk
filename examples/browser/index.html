<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwesk WebChat SDK - Browser Example</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: #2563eb;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .config-section {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
            background: #fef3c7;
        }
        .config-section h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #92400e;
        }
        .config-section input {
            width: 100%;
            padding: 8px 12px;
            margin: 5px 0;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #fafafa;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            max-width: 80%;
        }
        .message.sent {
            background: #2563eb;
            color: white;
            margin-left: auto;
        }
        .message.received {
            background: white;
            border: 1px solid #e5e7eb;
        }
        .message .agent-name {
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 4px;
            color: #6b7280;
        }
        .message.sent .agent-name { color: #dbeafe; }
        .message .text {
            word-wrap: break-word;
        }
        .message .time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 4px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
        }
        .input-area button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #1d4ed8;
        }
        .input-area button:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }
        .status {
            padding: 10px 20px;
            background: #f3f4f6;
            border-top: 1px solid #e5e7eb;
            font-size: 12px;
            color: #6b7280;
        }
        .file-input {
            display: none;
        }
        .attach-btn {
            padding: 12px;
            background: #6b7280;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dwesk WebChat SDK Demo</h1>
            <p>Browser Integration Example</p>
        </div>

        <div class="config-section">
            <h3>Configuration</h3>
            <input type="text" id="crmUrl" placeholder="CRM URL" value="https://your-crm.com">
            <input type="number" id="companyId" placeholder="Company ID" value="123">
            <input type="text" id="username" placeholder="API Username">
            <input type="password" id="password" placeholder="API Password">
            <input type="text" id="webhookUrl" placeholder="Webhook URL">
            <input type="text" id="customerName" placeholder="Your Name" value="John Doe">
            <input type="email" id="customerEmail" placeholder="Your Email" value="john@example.com">
            <input type="tel" id="customerPhone" placeholder="Your Phone" value="+1234567890">
            <button onclick="initializeSDK()" style="margin-top: 10px; width: 100%;">Initialize SDK</button>
        </div>

        <div class="chat-box" id="chatBox"></div>

        <div class="input-area">
            <button class="attach-btn" onclick="document.getElementById('fileInput').click()">File</button>
            <input type="file" id="fileInput" class="file-input" onchange="handleFileSelect(event)">
            <input type="text" id="messageInput" placeholder="Type message..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
        </div>

        <div class="status">
            <span id="status">Not connected</span>
        </div>
    </div>

    <script src="../../dist/dwesk-webchat.js"></script>
    
    <script>
        let sdk = null;

        function initializeSDK() {
            const config = {
                crmUrl: document.getElementById('crmUrl').value,
                companyId: parseInt(document.getElementById('companyId').value),
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                webhookUrl: document.getElementById('webhookUrl').value,
                customerInfo: {
                    name: document.getElementById('customerName').value,
                    email: document.getElementById('customerEmail').value,
                    phone: document.getElementById('customerPhone').value
                },
                pollInterval: 3000,
                debug: true
            };

            try {
                sdk = new DweskWebChatSDK(config);

                sdk.onReply((message) => {
                    addMessage(message.message, 'received', message.agentName, message.timestamp);
                });

                sdk.onError((error) => {
                    updateStatus('Error: ' + error.error.message, 'error');
                });

                document.getElementById('messageInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;

                updateStatus('Connected');
            } catch (error) {
                updateStatus('Failed: ' + error.message, 'error');
            }
        }

        async function sendMessage() {
            if (!sdk) return;

            const input = document.getElementById('messageInput');
            const message = input.value.trim();

            if (!message) return;

            try {
                updateStatus('Sending...');
                const response = await sdk.sendMessage(message);
                
                addMessage(message, 'sent', 'You');
                input.value = '';
                
                updateStatus('Sent');
            } catch (error) {
                updateStatus('Error: ' + error.message, 'error');
            }
        }

        async function handleFileSelect(event) {
            if (!sdk) return;

            const file = event.target.files[0];
            if (!file) return;

            try {
                updateStatus('Uploading...');
                const response = await sdk.sendFile(file, '[File]');
                
                addMessage(file.name, 'sent', 'You');
                updateStatus('File sent');
            } catch (error) {
                updateStatus('Error: ' + error.message, 'error');
            }

            event.target.value = '';
        }

        function addMessage(text, type, sender = '', time = null) {
            const chatBox = document.getElementById('chatBox');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message ' + type;
            
            let html = '';
            if (sender) {
                html += '<div class="agent-name">' + sender + '</div>';
            }
            html += '<div class="text">' + text + '</div>';
            if (time) {
                html += '<div class="time">' + new Date(time).toLocaleTimeString() + '</div>';
            }
            
            messageDiv.innerHTML = html;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function updateStatus(text, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = text;
            status.style.color = type === 'error' ? '#ef4444' : '#6b7280';
        }

        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
